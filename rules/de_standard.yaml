language: de
name: "Standard sung German"
description: "Default conventions for classical sung German"

# Explicit processing order — last tier wins on conflicts
processing_order:
  - substitutions
  - contextual
  - insertions
  - overrides

# Tier 1: Simple phoneme-to-phoneme replacements
# These always apply regardless of position
substitutions:
  "ʁ": "ʀ"  # default: uvular fricative → uvular trill

# Tier 2: Position-dependent rules
contextual:
  - match: "ʁ"
    position: word_final
    after: vowel
    replace: "ɐ"
    enabled: true

  - match: "ʁ"
    position: intervocalic
    replace: "ɾ"
    enabled: true

  - match: "ʁ"
    position: word_initial
    replace: "r"
    enabled: true

  - match: "ɪk"
    position: word_final
    after_grapheme: "ig"
    replace: "ɪç"
    enabled: true

# Tier 3: Insertion rules
insertions:
  - insert: "ʔ"
    position: before_word_initial_vowel
    enabled: true

# Tier 4: Word-level overrides (highest priority, always wins)
overrides:
  "Herr": "hɛr"
  "Kirche": "kɪʁçə"
