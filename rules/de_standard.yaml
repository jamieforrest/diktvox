language: de
name: "Standard sung German"
description: "Default conventions for classical sung German"

# Explicit processing order ‚ÄĒ last tier wins on conflicts
processing_order:
  - substitutions
  - contextual
  - insertions
  - overrides

# Tier 1: Simple phoneme-to-phoneme replacements
# These always apply regardless of position
substitutions:
  " Ā": " Ä"  # default: uvular fricative ‚Üí uvular trill
  "…ú": "…ź"  # espeak outputs English mid-central […ú] for German vocalized -er; should be […ź]

# Tier 2: Position-dependent rules
contextual:
  - match: " Ā"
    position: word_final
    after: vowel
    replace: "…ź"
    enabled: true

  - match: " Ā"
    position: intervocalic
    replace: "…ĺ"
    enabled: true

  - match: " Ā"
    position: word_initial
    replace: "r"
    enabled: true

  - match: "…™k"
    position: word_final
    after_grapheme: "ig"
    replace: "…™√ß"
    enabled: true

# Tier 3: Insertion rules
insertions:
  - insert: " Ē"
    position: before_word_initial_vowel
    enabled: true

# Tier 4: Word-level overrides (highest priority, always wins)
overrides:
  "Herr": "h…õr"
  "Kirche": "k…™ Ā√ß…ô"
  # espeak over-applies final devoicing before liquids (/l/, /r/)
  "Unsterblich": "ňą än ÉtňĆ…õ…ĺbl…™√ß"
  "unsterblich": "ňą än ÉtňĆ…õ…ĺbl…™√ß"
  "Unsterbliches": "ňą än ÉtňĆ…õ…ĺbl…™√ß…ôs"
  "lieblich": "lňąiňźbl…™√ß"
  "Lieblich": "lňąiňźbl…™√ß"
  "m√∂glich": "mňą√łňź…°l…™√ß"
  "M√∂glich": "mňą√łňź…°l…™√ß"
  "sterblich": "ňą Ét…õ…ĺbl…™√ß"
  "Sterblich": "ňą Ét…õ…ĺbl…™√ß"
